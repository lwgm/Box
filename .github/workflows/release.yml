name: Build My Box (Release)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      dontpublish:
        description: '构建后不提交发布新版'
        required: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # ✅ 添加这行，允许创建 Release
    
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          
      - name: Get version tag
        run: |
          tag=$(date +'%Y%m%d-%H%M')
          echo "tag=$tag" >> $GITHUB_ENV
          echo "commitS=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          
      - name: Modify VersionName
        run: |
          sed -i "s/\.concat(buildTime())/ +\"${{ env.tag }}\"/g" app/build.gradle 
          sed -i "/android:text=/s#=\"#=\"${{ env.tag }}\\\\n\\\\n#" app/src/main/res/layout/dialog_about.xml
          
          if grep -q 'crosswalk' build.gradle; then
            sed -i "/crosswalk/a\        maven { url 'https://j4uq.github.io/crosswalk/releases/crosswalk/android/maven2' }" build.gradle
          else
            sed -i "/jitpack.io/a\        maven { url 'https://j4uq.github.io/crosswalk/releases/crosswalk/android/maven2' }" build.gradle
          fi
          
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.8'
          
      - name: Install Python dependencies
        run: |
          pip install lxml ujson pyquery requests jsonpath cachetools pycryptodome beautifulsoup4
          
      - name: Modify pyramid build.gradle
        run: |
          sed -i '/buildPython.*python.exe/d' pyramid/build.gradle
          
      - name: Setup local.properties
        run: echo "" > local.properties 
          
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        
      - name: Setup Release Signing
        run: |
          signingConfigs=''
          signingConfig='ICAgICAgICAgICAgaWYgKHByb2plY3QuaGFzUHJvcGVydHkoIlJFTEVBU0VfU1RPUkVfRklMRSIpKSB7XAogICAgICAgICAgICAgICAgc2lnbmluZ0NvbmZpZyBzaWduaW5nQ29uZmlncy5teUNvbmZpZ1wKICAgICAgICAgICAgfVwK'
          signingConfigs="$(echo "$signingConfigs" |base64 -d )"
          signingConfig="$(echo "$signingConfig" |base64 -d )"
          sed -i -e "/defaultConfig {/i\\$signingConfigs " -e "/debug {/a\\$signingConfig " -e "/release {/a\\$signingConfig " app/build.gradle
          
      - name: Setup Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/my-release-key.jks
          echo "RELEASE_STORE_FILE=./my-release-key.jks" >> gradle.properties
          echo "RELEASE_KEY_ALIAS=$KEY_ALIAS" >> gradle.properties
          echo "RELEASE_STORE_PASSWORD=$KEYSTORE_PASSWORD" >> gradle.properties
          echo "RELEASE_KEY_PASSWORD=$KEY_PASSWORD" >> gradle.properties
          
      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --build-cache --parallel --daemon
          
      - name: Find and Prepare APK
        run: |
          mkdir -p apk/
          # ✅ 修复：搜索所有可能的 APK 路径
          echo "Searching for APK files..."
          find app/build/outputs/apk -name "*.apk" -type f
          
          # 找到第一个非测试的 APK（排除 non-minified 和 test）
          for file in $(find app/build/outputs/apk -name "*.apk" -type f | grep -v "non-minified" | grep -v "test"); do
            if [[ -f "$file" ]]; then
              cp "$file" "apk/Box_MyFork_${{ env.tag }}.apk"
              echo "✅ APK copied from: $file"
              echo "APK_PATH=apk/Box_MyFork_${{ env.tag }}.apk" >> $GITHUB_ENV
              break
            fi
          done
          
          # 验证 APK 是否存在
          if [ ! -f "apk/Box_MyFork_${{ env.tag }}.apk" ]; then
            echo "❌ No APK found!"
            ls -la app/build/outputs/apk/
            exit 1
          fi
          
          ls -la apk/
          
      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: Box-MyFork-${{ env.tag }}
          path: apk/*.apk
          if-no-files-found: error  # ✅ 如果没找到文件就报错
          
      - name: Create Release
        if: ${{ !inputs.dontpublish }}
        uses: ncipollo/release-action@v1
        with:
          name: Release-${{ env.tag }}
          tag: Release-${{ env.tag }}
          body: |
            ## Auto Build Release
            - Commit: ${{ env.commitS }}
            - Build Time: ${{ env.tag }}
          artifacts: apk/*.apk
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}  # ✅ 显式指定 token