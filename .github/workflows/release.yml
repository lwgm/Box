name: Build My Box (Release)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      dontpublish:
        description: '构建后不提交发布新版'
        required: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          
      - name: Get version tag
        run: |
          tag=$(date +'%Y%m%d-%H%M')
          echo "tag=$tag" >> $GITHUB_ENV
          echo "commitS=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          
      - name: Modify VersionName
        run: |
          sed -i "s/\.concat(buildTime())/ +\"${{ env.tag }}\"/g" app/build.gradle 
          sed -i "/android:text=/s#=\"#=\"${{ env.tag }}\\\\n\\\\n#" app/src/main/res/layout/dialog_about.xml
          
          if grep -q 'crosswalk' build.gradle; then
            sed -i "/crosswalk/a\        maven { url 'https://j4uq.github.io/crosswalk/releases/crosswalk/android/maven2' }" build.gradle
          else
            sed -i "/jitpack.io/a\        maven { url 'https://j4uq.github.io/crosswalk/releases/crosswalk/android/maven2' }" build.gradle
          fi
          
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.8'
          
      - name: Install Python dependencies
        run: |
          pip install lxml ujson pyquery requests jsonpath cachetools pycryptodome beautifulsoup4
          
      - name: Modify pyramid build.gradle
        run: |
          sed -i '/buildPython.*python.exe/d' pyramid/build.gradle
          
      - name: Setup local.properties
        run: echo "" > local.properties 
          
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        
      - name: Setup Release Signing
        run: |
          signingConfigs=''
          signingConfig='ICAgICAgICAgICAgaWYgKHByb2plY3QuaGFzUHJvcGVydHkoIlJFTEVBU0VfU1RPUkVfRklMRSIpKSB7XAogICAgICAgICAgICAgICAgc2lnbmluZ0NvbmZpZyBzaWduaW5nQ29uZmlncy5teUNvbmZpZ1wKICAgICAgICAgICAgfVwK'
          signingConfigs="$(echo "$signingConfigs" |base64 -d )"
          signingConfig="$(echo "$signingConfig" |base64 -d )"
          sed -i -e "/defaultConfig {/i\\$signingConfigs " -e "/debug {/a\\$signingConfig " -e "/release {/a\\$signingConfig " app/build.gradle
          
      - name: Setup Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/my-release-key.jks
          echo "RELEASE_STORE_FILE=./my-release-key.jks" >> gradle.properties
          echo "RELEASE_KEY_ALIAS=$KEY_ALIAS" >> gradle.properties
          echo "RELEASE_STORE_PASSWORD=$KEYSTORE_PASSWORD" >> gradle.properties
          echo "RELEASE_KEY_PASSWORD=$KEY_PASSWORD" >> gradle.properties
          
      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --build-cache --parallel --daemon --warning-mode all
          
      - name: Prepare APK (处理所有架构)
        run: |
          rm -rf apk/
          mkdir -p apk/
          
          echo "Searching for APK files..."
          find ~ -name "*release*.apk" -type f 2>/dev/null
          
          for file in `find ~ -name "*release*.apk" -print 2>/dev/null`; do
            base=$(basename "$file")
            
            # 提取架构信息
            if [[ "$base" == *"arm64"* ]]; then
              arch="arm64"
            elif [[ "$base" == *"armeabi"* ]]; then
              arch="armeabi"
            else
              arch="generic"
            fi
            
            # 提取平台类型
            if [[ "$base" == *"hisense"* ]]; then
              platform="hisense"
            else
              platform="generic"
            fi
            
            # 提取 Python/Java 版本
            if [[ "$base" == *"python"* ]]; then
              version="python"
            else
              version="java"
            fi
            
            new_name="TVBox_${{ env.tag }}-${arch}-${platform}-${version}.apk"
            cp "$file" "apk/$new_name"
            echo "✅ Copied: $new_name"
          done
          
          echo "=== All APK files ==="
          ls -la apk/
          
          count=$(ls -1 apk/*.apk 2>/dev/null | wc -l)
          echo "Total APKs: $count"
          
      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: TVBox-Build-${{ env.tag }}
          path: apk/*.apk
          if-no-files-found: error
          
      - name: Create Release
        if: ${{ !inputs.dontpublish }}
        uses: ncipollo/release-action@v1
        with:
          name: ${{ env.tag }}
          tag: ${{ env.tag }}
          body: |
            ## Auto Build Release
            - Commit: ${{ env.commitS }}
            - Build Time: ${{ env.tag }}
          artifacts: apk/*.apk
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}